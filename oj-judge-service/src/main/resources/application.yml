server:
  port: 8084

spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/oj_judge_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: qwer1234
      initial-size: 20
      min-idle: 20
      max-active: 100
      max-wait: 5000
  data:
    redis:
      host: 192.168.141.128
      port: 6378
      password: qwer1234
      database: 0
      client-type: jedis
      jedis:
        pool:
          max-active: 200
          max-idle: 100
          min-idle: 50
          max-wait: 3000
          time-between-eviction-runs: 10s
      timeout: 5000ms
  jackson:
    default-property-inclusion: non_null

rocketmq:
  name-server: 192.168.141.128:9876
  producer:
    group: judge-producer-group
    send-message-timeout: 10000
    retry-times-when-send-async-failed: 2

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oj.judge.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Judge0配置
sky:
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: 
    access-key-secret: 
    bucket-name: 
  judge0:
    api-url: http://192.168.141.128:2358
    api-key: ""
    max-wait-seconds: 15
    poll-interval-ms: 500

# 恶意代码检测配置
malicious-code:
  enabled: true
  log-malicious-submissions: true
  max-code-length: 100000

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  default-flat-param-object: true
  group-configs:
    - group: judge-service
      paths-to-match: /**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: oj-judge-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    com:
      oj:
        mapper: debug
        service: info
        controller: info
