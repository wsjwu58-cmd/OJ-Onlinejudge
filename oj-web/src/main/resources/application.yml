server:
  port: 8080
  tomcat:
    threads:
      max: 500
      min-spare: 50
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000
    async-request-timeout: 120000

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&allowPublicKeyRetrieval=true&jdbcCompliantTruncation=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
      # ✅ Druid 连接池配置
      initial-size: 20             # 初始连接数
      min-idle: 20                 # 最小空闲连接
      max-active: 100              # 最大活跃连接（根据数据库承受能力）
      max-wait: 5000               # 获取连接最大等待 5 秒
  data:
    redis:
      host: ${sky.redis.host}
      port: ${sky.redis.port}
      password: ${sky.redis.password}
      database: ${sky.redis.database}
      client-type: jedis
      jedis:
        pool:
          max-active: 200
          max-idle: 100
          min-idle: 50
          max-wait: 3000
          time-between-eviction-runs: 10s
          test-on-borrow: false
          test-on-return: false
          test-while-idle: true
          min-evictable-idle-time: 30m
  jackson:
    default-property-inclusion: non_null

langchain4j:
  open-ai:
    chat-model:
      api-key: ${sky.ai.api-key}
      base-url: ${sky.ai.base-url}
      model-name: ${sky.ai.model}
      temperature: 0.7
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${sky.ai.api-key}
      base-url: ${sky.ai.base-url}
      model-name: ${sky.ai.model}
      temperature: 0.7
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${sky.ai.api-key}
      base-url: ${sky.ai.base-url}
      model-name: ${sky.ai.embedding-model}
      log-requests: true
      log-responses: true

rocketmq:
  name-server: ${sky.rocketmq.name-server}
  producer:
    group: judge-producer-group
    send-message-timeout: 10000
    retry-times-when-send-async-failed: 2

springdoc:
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oj.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      oj:
        mapper: debug
        service: info
        controller: info
#    dev.langchain4j: DEBUG
#    com.oj.service.agent: DEBUG

sky:
  jwt:
    admin-secret-key: itcast-sky-take-out-admin-secret-key-2024
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key: itheima-sky-take-out-user-secret-key-2024
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}

knowledge:
  auto-import:
    enabled: false
    path: ./knowledge/pdfs/
