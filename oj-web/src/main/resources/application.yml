server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&allowPublicKeyRetrieval=true&jdbcCompliantTruncation=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  data:
    redis:
      host: ${sky.redis.host}
      port:  ${sky.redis.port}
      password: ${sky.redis.password}
      database: ${sky.redis.database}
#      lettuce:
      client-type: jedis        # ← 加这一行！
      jedis:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
        default-property-inclusion: non_null # JSON处理时忽略非空字段
  ai:
    openai:
      api-key: ${sky.ai.api-key}
      base-url: ${sky.ai.base-url}
      chat:
        options:
          model: ${sky.ai.model}
          temperature: 0.7
      embedding:
        options:
          model: ${sky.ai.embedding-model}
#    vectorstore:
#      redis:
#        uri: redis://${sky.redis.host}:${sky.redis.port}
#        password: ${sky.redis.password}
#        index: knowledge_index
#        prefix: "knowledge:"
#        initialize-schema: true

# RocketMQ 配置
rocketmq:
  name-server: ${sky.rocketmq.name-server}
  producer:
    group: judge-producer-group
    send-message-timeout: 10000
    retry-times-when-send-async-failed: 2

# SpringDoc / Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oj.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥（jjwt 0.12+ 要求 HS256 密钥至少 32 字节）
    admin-secret-key: 
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key:
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}

# 知识库配置
knowledge:
  auto-import:
    enabled: false
    path: ./knowledge/pdfs/


