server:
  port: 8082

spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/oj_problem_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: qwer1234
      initial-size: 20
      min-idle: 20
      max-active: 100
      max-wait: 5000
  data:
    redis:
      host: 192.168.141.128
      port: 6378
      password: qwer1234
      database: 0
      client-type: jedis
      jedis:
        pool:
          max-active: 200
          max-idle: 100
          min-idle: 50
          max-wait: 3000
          time-between-eviction-runs: 10s
      timeout: 5000ms
  jackson:
    default-property-inclusion: non_null

# LangChain4j - 知识库嵌入配置
langchain4j:
  open-ai:
    embedding-model:
      api-key: sk-lkwtccrympupzlgcncgvjmnodewoopvohmcmxazaykqvkobi
      base-url: https://api.siliconflow.cn/v1
      model-name: BAAI/bge-large-zh-v1.5
  embedding-store:
    type: in-memory

# OSS配置
sky:
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: LTAI5tM9m2ttz588LxyfZR9A
    access-key-secret: VhkWLyiq6J658RjS8XjW2Tem4cdLcn
    bucket-name: wsj123

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oj.problem.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  default-flat-param-object: true
  group-configs:
    - group: problem-service
      paths-to-match: /**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: oj-problem-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    com:
      oj:
        mapper: debug
        service: info
        controller: info

knowledge:
  auto-import:
    enabled: false
    path: ""
